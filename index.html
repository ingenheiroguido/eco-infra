<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<title>EcoInfra</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>EcoInfra</h1>
<p>Sistema de dimensionamento de resíduos</p>

<div class="card">

<h2>Dados do Edifício</h2>

<form id="calcForm">

<label>Andares</label>
<input type="number" id="floors" required>

<label>Unidades por andar</label>
<input type="number" id="units" required>

<label>Pessoas por unidade</label>
<input type="number" id="people" required>

<button type="submit">Calcular Projeto</button>
<button type="button" onclick="salvarProjeto()">Salvar Projeto</button>

</form>

</div>

<div class="card">

<h2>Resultados do Projeto</h2>
<div id="resultado" class="resultado-box"></div>
<h2>Projetos Salvos</h2>

<div id="listaProjetos"></div>

</div>

</div>

</div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
