<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>EcoInfra</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🌱 EcoInfra</h1>
<p>Dimensionamento inteligente de resíduos urbanos</p>

<div class="card">

<h2>Dados do Edifício</h2>

<form id="calcForm">

<label>Andares</label>
<input type="number" id="floors" required>

<label>Unidades por andar</label>
<input type="number" id="units" required>

<label>Pessoas por unidade</label>
<input type="number" id="people" required>

<button type="submit">Calcular Projeto</button>
<button type="button" onclick="salvarProjeto()">Salvar Projeto</button>
<button type="button" onclick="gerarPDF()">Gerar PDF</button>

</form>

</div>

<div class="card">

<h2>Resultados do Projeto</h2>
<div id="resultado"></div>

<h3>Projetos Salvos</h3>
<div id="listaProjetos"></div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
